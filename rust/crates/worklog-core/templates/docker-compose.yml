# worklog web — rendered by `worklog web up`.
#
# The data dir is substituted at render time so the container can see
# both the SQLite DB (for reads) and the daemon's unix socket (for writes).
# Do not edit this file by hand — regenerate it with `worklog web up`.

services:
  web:
    image: worklog-web:latest
    build:
      context: {{WEB_CONTEXT}}
      dockerfile: Dockerfile
    container_name: worklog-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:{{PORT}}:3000"
    # Bind-mount the data dir so bun:sqlite can read the WAL DB directly.
    # Writes go through the Rust daemon over TCP — Docker Desktop on macOS
    # can't proxy unix sockets through its VM bind-mount layer, so we use
    # host.docker.internal to reach the daemon on 127.0.0.1:9323.
    volumes:
      - "{{WORKLOG_DATA_DIR}}:/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WORKLOG_DB=/data/worklog.db
      - WORKLOG_DAEMON_URL=http://host.docker.internal:9323
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
