# worklog web — review UI container.
#
# One service, two bind mounts:
#   - $WORKLOG_HOME (defaults to ~/.local/share/worklog) → /data
#     gives the container the SQLite DB + WAL files + the unix socket
#     the Rust daemon exposes
#
# The Rust daemon must be running on the host first — start it with
# `worklog daemon &` or via `worklog web up` (which does both).
#
# Traffic: http://localhost:3333 on the host → port 3000 in the container.

services:
  web:
    image: worklog-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worklog-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3333:3000"
    # Bind-mount the data dir so bun:sqlite can read the DB directly;
    # writes go over TCP to the host daemon. Docker Desktop on macOS
    # can't proxy unix sockets across its VM bind mounts, hence the
    # TCP route.
    volumes:
      - "${WORKLOG_HOME:-${HOME}/.local/share/worklog}:/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WORKLOG_DB=/data/worklog.db
      - WORKLOG_DAEMON_URL=http://host.docker.internal:9323
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
